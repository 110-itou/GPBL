services:
  # Backend API
  - type: web
    name: dockflow-api-backend
    runtime: node
    rootDir: dockflow/backend
    buildCommand: npm install
    preDeployCommand: npm run migrate
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dockflow-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /api/health
    
  # Frontend
  - type: web
    name: dockflow-api-frontend
    runtime: static
    rootDir: dockflow/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: /api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://dockflow-api-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # PostgreSQL Database
  - name: dockflow-db
    databaseName: dockflow
    user: dockflow_user
    plan: free
